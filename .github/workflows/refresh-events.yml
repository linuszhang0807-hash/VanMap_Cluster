name: Refresh Events Weekly

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r slave_scraper/requirements.txt
      - name: Run events scraper
        working-directory: slave_scraper
        run: python events_scraper.py --sync
      - name: Sync to frontend data copy
        run: cp data/events_data.json slave_coder/src/shared_data/
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events_data.json slave_coder/src/shared_data/events_data.json
          git diff --staged --quiet || git commit -m "chore: weekly events refresh"
          git push || true
